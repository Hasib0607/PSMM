services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psmm}
      POSTGRES_USER: ${POSTGRES_USER:-psmm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psmm}
    volumes:
      - psmm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psmm} -d ${POSTGRES_DB:-psmm}"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - psmm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  psmm_postgres_data:
  psmm_redis_data:
